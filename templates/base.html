<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vision Detection System{% endblock %}</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'nn-blue': '#00f0ff',
                        'nn-dark': '#0a0e17',
                        'nn-darker': '#060912',
                    }
                }
            }
        }
   </script>
                     <!-- SweetAlert2 - beautiful confirmation dialogs -->
           <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



    <!-- Optional: Bootstrap Icons if you still use bi- classes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #0a0e17;
            color: #e5e7eb;
        }
        /* Smooth scroll and better font */
        html {
            scroll-behavior: smooth;
        }
    </style>

 <script>
    function showDeleteConfirm(event, form) {
        event.preventDefault(); // Stop immediate submit

        Swal.fire({
            title: 'Delete Detection?',
            text: "This action cannot be undone.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Yes, Delete',
            cancelButtonText: 'Cancel',
            reverseButtons: true,
            customClass: {
                popup: 'rounded-3xl bg-gray-900 border border-gray-700 text-white shadow-2xl',
                title: 'text-2xl font-bold text-nn-blue',
                htmlContainer: 'text-gray-300 text-lg',
                confirmButton: 'bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl font-bold text-white',
                cancelButton: 'bg-gray-700 hover:bg-gray-800 px-8 py-3 rounded-xl font-bold text-white'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit(); // Proceed with delete only if confirmed
            }
        });

        return false; // Prevent default form action
    }
</script>

</head>
<body class="min-h-screen bg-nn-dark text-gray-100 antialiased">

    <!-- Sidebar Navigation -->
    <aside class="fixed inset-y-0 left-0 w-64 bg-nn-darker border-r border-gray-800 p-6 flex flex-col z-50 overflow-y-auto">
        <div class="flex items-center mb-12">
            <span class="text-3xl font-bold text-nn-blue">Vision<span class="text-white">System</span></span>
        </div>

        <nav class="space-y-2 flex-1">
            <a href="{{ url_for('home') }}"
               class="flex items-center px-4 py-3 rounded-lg {% if request.path in ['/', '/home'] %}bg-gray-800 text-nn-blue{% else %}hover:bg-gray-800{% endif %}">
                <span class="mr-3 text-xl">🏠</span> Home
            </a>

            {% if current_user.is_authenticated %}
                <a href="{{ url_for('dashboard') }}"
                   class="flex items-center px-4 py-3 rounded-lg {% if 'dashboard' in request.path %}bg-gray-800 text-nn-blue{% else %}hover:bg-gray-800{% endif %}">
                    <span class="mr-3 text-xl">📊</span> Dashboard
                </a>
                <a href="{{ url_for('webcam') }}"
                   class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-800">
                    <span class="mr-3 text-xl">🎥</span> Live Detection
                </a>
                <a href="{{ url_for('history') }}"
                   class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-800">
                    <span class="mr-3 text-xl">🔍</span> History
                </a>
            {% endif %}
        </nav>

        <!-- Auth links at bottom -->
        <div class="mt-auto pt-6 border-t border-gray-800">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}"
                   class="flex items-center px-4 py-3 rounded-lg hover:bg-red-900/30 text-red-400">
                    <span class="mr-3 text-xl">🚪</span> Logout
                </a>
            {% else %}
                <a href="{{ url_for('login') }}"
                   class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-800">
                    <span class="mr-3 text-xl">🔑</span> Login
                </a>
                <a href="{{ url_for('register') }}"
                   class="flex items-center px-4 py-3 mt-2 bg-nn-blue text-nn-dark rounded-lg font-bold hover:bg-cyan-300 justify-center">
                    Register
                </a>
            {% endif %}
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="ml-64 min-h-screen">
        <!-- Page content will be injected here -->
        {% block content %}{% endblock %}
    </main>
    
    
</body>
</html>
