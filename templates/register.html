{% extends "base.html" %}

{% block title %}Register - Vision Detection System{% endblock %}

{% block content %}

<!-- Full-screen centered container -->
<div class="min-h-screen flex items-center justify-center bg-nn-dark px-6 py-12">
    
    <!-- Professional rounded card -->
    <div class="w-full max-w-md bg-gray-900/70 backdrop-blur-xl border border-gray-700/50 rounded-3xl shadow-2xl shadow-nn-blue/20 overflow-hidden transform transition-all duration-300 hover:shadow-nn-blue/40">
        
        <!-- Card Header -->
        <div class="px-8 pt-10 pb-6 text-center">
            <h2 class="text-4xl font-bold text-nn-blue mb-2">Create Account</h2>
            <p class="text-gray-400 text-lg">Join the Vision Detection System</p>
        </div>

        <!-- Form Body -->
        <div class="px-8 pb-10">
            
            {% if error %}
            <div class="bg-red-900/40 border border-red-500/50 text-red-200 px-4 py-3 rounded-2xl mb-6 text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <!-- Username -->
                <div>
                    <label class="block text-gray-300 font-medium mb-2 text-lg">
                        Username
                    </label>
                    <input 
                        type="text" 
                        name="username" 
                        class="w-full px-5 py-4 bg-gray-800/70 border border-gray-600 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:border-nn-blue focus:ring-2 focus:ring-nn-blue/30 transition-all duration-300 text-lg"
                        required 
                        autofocus 
                        placeholder="Choose a username"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-gray-300 font-medium mb-2 text-lg">
                        Password
                    </label>
                    <input 
                        type="password" 
                        name="password" 
                        class="w-full px-5 py-4 bg-gray-800/70 border border-gray-600 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:border-nn-blue focus:ring-2 focus:ring-nn-blue/30 transition-all duration-300 text-lg"
                        required 
                        placeholder="Create a strong password"
                    >
                </div>

                <!-- Register Button -->
                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-r from-nn-blue to-cyan-600 text-nn-dark font-bold text-xl py-4 rounded-2xl mt-4 shadow-lg hover:shadow-nn-blue/50 hover:scale-[1.02] transition-all duration-300 transform"
                >
                    Register
                </button>
            </form>

            <!-- Login Link -->
            <div class="text-center mt-8">
                <p class="text-gray-400 text-lg">
                    Already have an account? 
                    <a href="{{ url_for('login') }}" 
                       class="text-nn-blue font-semibold hover:text-cyan-300 transition-colors duration-200 underline underline-offset-4 hover:no-underline">
                        Login
                    </a>
                </p>
            </div>

        </div>

    </div>

</div>

{% endblock %}
